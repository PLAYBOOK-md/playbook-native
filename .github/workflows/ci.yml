name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Fail if dist/ is stale
        run: |
          if ! git diff --exit-code dist/; then
            echo "::error::dist/ is out of date; run 'npm run build' and commit."
            exit 1
          fi
