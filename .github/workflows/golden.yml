name: Golden path
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Monday 06:00 UTC

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run golden + vectors
        env:
          RUN_GOLDEN: '1'
          RUN_VECTORS: '1'
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx vitest run test/integration.test.ts test/vectors.test.ts
